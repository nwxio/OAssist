services:

  outline:
    image: outlinewiki/outline:latest
    env_file: ./.env
    depends_on:
    #  - postgres
      - redis
    ports:
      - '3000:3000'

  redis:
    image: redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 30s
      retries: 3
    ports:
      - '6380:6379'

