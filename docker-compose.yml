services:
  qdrant:
    image: qdrant/qdrant:v1.15.1
    restart: unless-stopped
    ports:
      - "6333:6333"
    volumes:
      - qdrant-data:/qdrant/storage

  ollama:
    image: ollama/ollama:0.11.10
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    profiles:
      - ollama

  oassist-api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - qdrant
    ports:
      - "8181:8081"
    volumes:
      - ./data:/data

  oassist-worker:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - qdrant
    command: ["python", "-m", "worker.main"]

volumes:
  qdrant-data:
  ollama-data:
