<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">OAssist Chat UI Preview</title>
  <desc id="desc">Stylized preview of the OAssist chat interface with sidebar, source tree, and chat messages.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7f9fc"/>
      <stop offset="100%" stop-color="#eef3fb"/>
    </linearGradient>
    <linearGradient id="header" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1d3557"/>
      <stop offset="100%" stop-color="#457b9d"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#1f2a44" flood-opacity="0.15"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="1280" height="720" fill="url(#bg)"/>

  <rect x="48" y="36" width="1184" height="648" rx="16" fill="#ffffff" filter="url(#shadow)"/>
  <rect x="48" y="36" width="1184" height="64" rx="16" fill="url(#header)"/>
  <rect x="48" y="84" width="1184" height="16" fill="url(#header)"/>

  <circle cx="80" cy="68" r="7" fill="#f94144"/>
  <circle cx="102" cy="68" r="7" fill="#f9c74f"/>
  <circle cx="124" cy="68" r="7" fill="#90be6d"/>
  <text x="160" y="74" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#ffffff">OAssist</text>
  <text x="1100" y="74" font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="#dfe9f3">Admin Session</text>

  <rect x="72" y="124" width="280" height="536" rx="12" fill="#f5f8fc"/>
  <text x="96" y="158" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#1d3557">Chats</text>

  <rect x="92" y="172" width="240" height="42" rx="8" fill="#dbe8f5"/>
  <text x="108" y="198" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#22314d">Migration Checklist</text>

  <rect x="92" y="224" width="240" height="42" rx="8" fill="#ffffff" stroke="#d7e1ef"/>
  <text x="108" y="250" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#4f5d75">Qdrant Tuning Notes</text>

  <rect x="92" y="276" width="240" height="42" rx="8" fill="#ffffff" stroke="#d7e1ef"/>
  <text x="108" y="302" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#4f5d75">SSO Setup Guide</text>

  <text x="96" y="354" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#1d3557">Sources</text>
  <text x="108" y="382" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#4f5d75">- Outline</text>
  <text x="108" y="406" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#4f5d75">- Notion</text>
  <text x="108" y="430" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#4f5d75">- Files</text>

  <rect x="372" y="124" width="840" height="456" rx="12" fill="#f8fbff"/>

  <rect x="404" y="154" width="470" height="72" rx="12" fill="#ffffff" stroke="#d7e1ef"/>
  <text x="428" y="186" font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="#33415c">How do I configure OIDC with Keycloak in OAssist?</text>
  <text x="428" y="208" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#7b8ba8">User</text>

  <rect x="520" y="248" width="660" height="138" rx="12" fill="#e7f0fb" stroke="#c8dbf2"/>
  <text x="544" y="282" font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="#1d3557">Set AUTH_OIDC_* variables in .env, then register the exact callback</text>
  <text x="544" y="304" font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="#1d3557">URL in Keycloak. Enable SSO from /auth/oidc/global and verify</text>
  <text x="544" y="326" font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="#1d3557">group mappings for admin/user roles.</text>
  <text x="544" y="354" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#4f6d9a">Assistant · Sources: files:docs/sso.md, outline:Auth Setup</text>

  <rect x="404" y="404" width="776" height="86" rx="12" fill="#ffffff" stroke="#d7e1ef"/>
  <text x="428" y="436" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#2f3e5c">Artifacts</text>
  <rect x="428" y="448" width="220" height="30" rx="8" fill="#edf3fb"/>
  <text x="440" y="468" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#345078">oassist-keycloak-guide.pdf</text>
  <rect x="662" y="448" width="120" height="30" rx="8" fill="#457b9d"/>
  <text x="694" y="468" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#ffffff">Download</text>

  <rect x="372" y="594" width="840" height="66" rx="12" fill="#ffffff" stroke="#d7e1ef"/>
  <text x="404" y="634" font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="#7b8ba8">Ask anything about your knowledge sources...</text>

  <rect x="1088" y="608" width="100" height="36" rx="10" fill="#1d3557"/>
  <text x="1124" y="631" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#ffffff">Send</text>
</svg>
